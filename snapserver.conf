[server]
# Persistent storage for client names and groups
datadir = /config/

[http]
# Enables the web interface on port 1780
enabled = true
doc_root = /usr/share/snapserver/snapweb
port = 1780

[tcp-control]
# Required for the Snapcast App or Home Assistant integration
enabled = true
bind_to_address = 0.0.0.0
port = 1705

[stream]
# Default format for the server (Upgraded to 24-bit for Topping DX5)
sampleformat = 48000:24:2
codec = flac
# Low chunk size (20ms) improves multi-room synchronization
chunk_ms = 20

# --- STREAMS ---

# 1. Main Music Stream (Standard Pipe)
# Used for feeding audio via FFmpeg, Librespot, or Airplay providers
source = pipe:///tmp/snapfifo?name=Default&sampleformat=48000:24:2

# 2. LedFx Dedicated Stream
# Matches LedFx default rate. Using 'mode=read' prevents pipe collapse.
source = pipe:///tmp/snapfifo_ledfx?name=LedFx&sampleformat=44100:16:2&mode=read

# 3. Optional: High-Res Master Stream (384kHz Path)
# If you want to push your DX5 to the limit, uncomment this:
# source = pipe:///tmp/snapfifo_ultra?name=Ultra&sampleformat=192000:24:2

[logging]
# Send logs to stdout so they appear in 'docker logs snapserver'
filter = *:info